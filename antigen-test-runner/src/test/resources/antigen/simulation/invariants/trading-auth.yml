name: Trading - Authentication
description: >
  Business rules for authentication endpoints.
  Login must return a valid bearer token; /me must return an active user with consistent timestamps.

invariants:
  /api/v1/auth/login:
    POST:
      invariants:
        - name: token_present
          field: access_token
          is_not_empty: true

        # DEMO: will not be caught - testLogin only asserts on access_token, not token_type.
        # include_only scopes this invariant to testLogin specifically, overriding the
        # default (any test that calls POST /auth/login).
        - name: token_type_bearer
          field: token_type
          equals: bearer
          include_only:
            - class: io.antigen.core.demoapi.AuthApiTest
              methods:
                - testLogin

  /api/v1/auth/me:
    GET:
      invariants:
        - name: username_present
          field: username
          is_not_empty: true

        - name: email_present
          field: email
          is_not_empty: true

        # DEMO: will not be caught - testGetCurrentUser does not assert on is_active
        - name: current_user_active
          field: is_active
          equals: true

        # DEMO: will not be caught - testGetCurrentUser does not assert on timestamps
        - name: user_updated_after_created
          field: created_at
          less_than_or_equal: $.updated_at

# No feature-level include_only: invariants apply automatically to any test
# that exercises the matching endpoint (auto-detection).
