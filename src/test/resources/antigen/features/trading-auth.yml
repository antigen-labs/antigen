feature: Trading - Authentication
description: >
  Business rules for authentication endpoints.
  Login must return a valid bearer token; registration must produce an active user.

invariants:
  /api/v1/auth/login:
    POST:
      invariants:
        - name: token_present
          field: access_token
          is_not_empty: true

        - name: token_type_bearer
          field: token_type
          equals: bearer

  /api/v1/auth/register:
    POST:
      invariants:
        - name: new_user_active
          field: is_active
          equals: true

        - name: user_email_present
          field: email
          is_not_empty: true

        - name: user_username_present
          field: username
          is_not_empty: true

  /api/v1/auth/me:
    GET:
      invariants:
        - name: current_user_active
          field: is_active
          equals: true

        - name: user_updated_after_created
          field: created_at
          less_than_or_equal: $.updated_at

tests: []
